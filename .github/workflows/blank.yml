name: Download files

on:
  workflow_dispatch:
  push:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create download directory
        run: mkdir -p downloads

      - name: Download files from deb_links.txt
        run: |
          while read -r url; do
            [ -z "$url" ] && continue
            echo "Downloading $url"
      
            filename=$(echo "$url" | sed -n 's/.*file=\([^&]*\).*/\1/p')
      
            if [ -z "$filename" ]; then
              filename=$(basename "${url%%\?*}")
            fi
      
            # URL decode
            filename=$(printf '%b' "${filename//%/\\x}")
      
            # Replace slashes with underscore (IMPORTANT FIX)
            filename=$(echo "$filename" | tr '/' '_')
      
            # Remove other invalid characters
            filename=$(echo "$filename" | tr -d '\"<>|:*?\r\n')
      
            curl -L --fail -o "downloads/$filename" "$url"
          done < deb_links.txt

      - name: List downloaded files
        run: ls -la downloads/

      - name: Upload files as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-files
          path: downloads/
