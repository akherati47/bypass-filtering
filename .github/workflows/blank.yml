name: Download files

on:
  workflow_dispatch:
  push:

jobs:
  download:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Create download directory
        run: mkdir -p downloads

      - name: Download files from deb_links.txt
        run: |
          while read -r url; do
            [ -z "$url" ] && continue
            echo "Downloading $url"

            filename=$(echo "$url" | sed -n 's/.*file=\([^&]*\).*/\1/p')

            if [ -z "$filename" ]; then
              filename=$(basename "${url%%\?*}")
            fi

            # URL decode
            filename=$(printf '%b' "${filename//%/\\x}")

            # Replace slashes with underscore
            filename=$(echo "$filename" | tr '/' '_')

            # Remove invalid filename characters
            filename=$(echo "$filename" | tr -d '\"<>|:*?\r\n')

            curl -L --fail -o "downloads/$filename" "$url"
          done < deb_links.txt

      - name: List downloaded files
        run: ls -la downloads/

      - name: Upload files as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-files
          path: downloads/

      - name: Commit and push downloaded files
        run: |
          git add downloads/
      
          git diff --cached --quiet || \
          git commit -m "Add downloaded files" \
            --author="github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
      
          git push
