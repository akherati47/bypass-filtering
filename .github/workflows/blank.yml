name: Download .rar files

on:
  workflow_dispatch:   # run manually
  push:
    paths:
      - "deb_links.txt"   # or rename to rar_links.txt

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create download directory
        run: mkdir -p downloads

      - name: Download files from deb_links.txt
        run: |
          while read -r url; do
            [ -z "$url" ] && continue
            echo "Downloading $url"
      
            # Extract filename from "file=" parameter
            filename=$(echo "$url" | sed -n 's/.*file=\([^&]*\).*/\1/p')
      
            # Fallback if "file=" is not present
            if [ -z "$filename" ]; then
              filename=$(basename "${url%%\?*}")
            fi
      
            # URL-decode filename
            filename=$(printf '%b' "${filename//%/\\x}")
      
            # Final safety: remove any forbidden characters
            filename=$(echo "$filename" | tr -d '\"<>|:*?\r\n')
      
            curl -L --fail -o "downloads/$filename" "$url"
          done < deb_links.txt

      - name: List downloaded files
        run: ls -la downloads/

      - name: Upload files as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-files
          path: downloads/
