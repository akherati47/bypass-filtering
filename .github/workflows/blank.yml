name: Download files

on:
  workflow_dispatch:
  push:

jobs:
  download:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Create download directory
        run: mkdir -p downloads

      - name: Download files from deb_links.txt and chunk to 256KB html parts
        run: |
          while read -r url; do
            [ -z "$url" ] && continue
            echo "Downloading $url"

            filename=$(echo "$url" | sed -n 's/.*file=\([^&]*\).*/\1/p')

            if [ -z "$filename" ]; then
              filename=$(basename "${url%%\?*}")
            fi

            # URL decode
            filename=$(printf '%b' "${filename//%/\\x}")

            # Replace slashes with underscore
            filename=$(echo "$filename" | tr '/' '_')

            # Remove invalid filename characters
            filename=$(echo "$filename" | tr -d '\"<>|:*?\r\n')

            filepath="downloads/$filename"

            # Download original file
            curl -L --fail -o "$filepath" "$url"

            # Convert to base64 and split into 256KB chunks
            base64 "$filepath" | split -b 262144 -d -a 4 - "downloads/${filename}.part_"

            # Rename chunks to .html
            for part in downloads/${filename}.part_*; do
              mv "$part" "$part.html"
            done

            # Remove original file after chunking
            rm -f "$filepath"
          done < deb_links.txt

      - name: List downloaded files
        run: ls -lah downloads/

      - name: Upload files as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-files
          path: downloads/

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push downloaded files
        run: |
          git add downloads/
          git diff --cached --quiet || git commit -m "Add downloaded files as 256KB chunked html parts"
          git push
