name: Download files

on:
  workflow_dispatch:
  push:

jobs:
  download:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create directory
        run: mkdir -p downloads

      - name: Download and chunk files
        run: |
          while read -r url; do
            [ -z "$url" ] && continue

            echo "Downloading $url"

            filename=$(basename "${url%%\?*}")
            filename=$(echo "$filename" | tr -d '\"<>|:*?\r\n')

            filepath="downloads/$filename"

            curl -L --fail -o "$filepath" "$url"

            # convert to base64 without line wrapping
            base64 -w 0 "$filepath" > "$filepath.b64"

            # split into 256KB parts
            split -b 262144 -d -a 4 "$filepath.b64" "downloads/${filename}.part_"

            # rename parts to html
            for part in downloads/${filename}.part_*; do
              mv "$part" "$part.html"
            done

            rm "$filepath"
            rm "$filepath.b64"

          done < deb_links.txt

      - name: Commit files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add downloads/
          git commit -m "Add chunked files" || echo "No changes"
          git push
