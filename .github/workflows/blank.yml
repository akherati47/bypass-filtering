name: Download .rar files

on:
  workflow_dispatch:   # run manually
  push:
    paths:
      - "deb_links.txt"   # or rename to rar_links.txt

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create download directory
        run: mkdir -p downloads

      - name: Download files from links.txt
        run: |
          while read -r url; do
            [ -z "$url" ] && continue
            echo "Downloading $url"
            
            # Extract filename from the 'file=' parameter in the URL
            if [[ "$url" =~ file=([^&]+) ]]; then
              raw_filename="${BASH_REMATCH[1]}"
              # URL decode the filename
              filename=$(printf '%b' "${raw_filename//%/\\x}")
              # Remove any remaining invalid characters for artifact upload
              filename=$(echo "$filename" | sed 's/[^a-zA-Z0-9._-]/_/g')
            else
              # Fallback: use basename without query string
              filename=$(basename "$url" | cut -d'?' -f1)
              filename=$(echo "$filename" | sed 's/[^a-zA-Z0-9._-]/_/g')
            fi
            
            # Ensure .rar extension if missing
            if [[ "$filename" != *.rar && "$filename" != *.zip ]]; then
              filename="${filename}.rar"
            fi
            
            echo "Saving as: $filename"
            curl -L -o "downloads/$filename" "$url"
            
          done < deb_links.txt

      - name: List downloaded files
        run: ls -la downloads/

      - name: Upload files as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-files
          path: downloads/
